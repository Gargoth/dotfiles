name: dev-env
description: Quick LXD developer environment setup
config:
  user.user-data: |
    #cloud-config
    package_update: true
    package_upgrade: true
    packages:
      - atuin
      - eza
      - fastfetch
      - fd-find
      - fish
      - fzf
      - g++
      - git
      - git-delta
      - make
      - ripgrep
      - tealdeer
      - tmux
      - poppler-utils
      - python3-venv
      - curl
      - unzip
      - luarocks  # For norg plugins
    snap:
      commands:
        - snap install node --classic
        - snap install go --classic
        - snap install yazi --classic
        - snap install gh --classic
    users:
      - default
      - name: ubuntu
    runcmd:
      - sudo -i -u ubuntu chsh -s $(which fish)
      - sudo -i -u ubuntu mkdir -p /home/ubuntu/.local/bin
      - sudo -i -u ubuntu mkdir repos
      - sudo -i -u ubuntu git clone https://github.com/Gargoth/dotfiles.git ~/repos/dotfiles
      - sudo -i -u ubuntu yes | python3 ~/repos/dotfiles/create_config_symlinks.py
      - sudo -i -u ubuntu fish -c "fish_add_path ~/.local/bin"
      - sudo -i -u ubuntu fish -c "curl -fsSL https://raw.githubusercontent.com/MordechaiHadad/bob/master/scripts/install.sh | bash"
      - sudo -i -u ubuntu fish -c "yes | bob install v0.12.3 && yes | bob use v0.12.3 && fish_add_path ~/.local/share/bob/nvim-bin/"
